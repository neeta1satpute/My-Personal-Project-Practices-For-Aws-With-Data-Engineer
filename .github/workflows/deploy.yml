name: Deploy Lambda

on:
  push:
    branches: [dev]   # dev branch push झाल्यावर workflow run होईल

jobs:
  deploy:
    runs-on: ubuntu-latest   # GitHub hosted Linux runner

    steps:

      # =========================
      # 1️⃣ Checkout repo code
      # =========================
      - name: Checkout code
        uses: actions/checkout@v3


      # =========================
      # 2️⃣ ZIP Lambda code (FIXED)
      # =========================
      - name: Zip Lambda code
        run: |
          # FIX: repo मध्ये "functions" folder आहे (not Function)
          cd functions

          # entire folder zip करून root मध्ये function.zip तयार करतो
          zip -r ../function.zip .


      # =========================
      # 3️⃣ AWS Credentials setup
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          # FIX: correct key name (aws-region)
          aws-region: ${{ secrets.AWS_REGION }}


      # =========================
      # 4️⃣ Deploy to Lambda
      # =========================
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name MoveFileLambda \   # NEW correct name
            --zip-file fileb://function.zip