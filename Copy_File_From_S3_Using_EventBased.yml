AWSTemplateFormatVersion: 2010-09-09
Description: Full Lambda + S3 + EventBridge setup

Parameters:
  SourceBucket:
    Type: String
    Default: my-de-eventbased-source-bucket

  DestinationBucket:
    Type: String
    Default: my-de-eventbased-destination-bucket

  CodeBucket:
    Type: String
    Default: my-lambda-code-bucket-12345   # 👈 NEW bucket for code

  FunctionName:
    Type: String
    Default: MoveFileLambda

Resources:

# ======================
# SOURCE BUCKET
# ======================
SourceS3Bucket:
  Type: AWS::S3::Bucket
  Properties:
    BucketName: !Ref SourceBucket
    NotificationConfiguration:
      EventBridgeConfiguration:
        EventBridgeEnabled: true

# ======================
# DESTINATION BUCKET
# ======================
DestinationBucket:
  Type: AWS::S3::Bucket
  Properties:
    BucketName: !Ref DestinationBucket

# ======================
# CODE BUCKET (IMPORTANT)
# ======================
LambdaCodeBucket:
  Type: AWS::S3::Bucket
  Properties:
    BucketName: !Ref CodeBucket

# ======================
# IAM ROLE
# ======================
LambdaRole:
  Type: AWS::IAM::Role
  Properties:
    RoleName: !Sub "${FunctionName}-role"
    AssumeRolePolicyDocument:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
    Policies:
      - PolicyName: S3Access
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: "*"
            - Effect: Allow
              Action:
                - logs:*
              Resource: "*"

# ======================
# LAMBDA FUNCTION
# ======================
MoveFileLambda:
  Type: AWS::Lambda::Function
  Properties:
    FunctionName: !Ref FunctionName
    Runtime: python3.11
    Handler: MoveFileLambda.lambda_handler
    Role: !GetAtt LambdaRole.Arn
    Timeout: 300

    Code:
      S3Bucket: !Ref CodeBucket   # 👈 IMPORTANT
      S3Key: function.zip

    Environment:
      Variables:
        SOURCE_BUCKET: !Ref SourceBucket
        DEST_BUCKET: !Ref DestinationBucket