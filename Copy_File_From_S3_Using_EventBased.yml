AWSTemplateFormatVersion: 2010-09-09
Description: Event-based file move from S3 source to destination using Lambda (EventBridge enabled)

Parameters:
  SourceBucket:
    Type: String
    Description: Source S3 bucket name
    Default: my-de-eventbased-source-bucket

  DestinationBucket:
    Type: String
    Description: Destination S3 bucket name
    Default: my-de-eventbased-destination-bucket

  FunctionName:
    Type: String
    Default: MoveFileLambda   # THIS is actual Lambda name used everywhere
    Description: Lambda function name

Resources:

  # ==============================
  # SOURCE S3 BUCKET
  # ==============================
  SourceS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref SourceBucket
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  # ==============================
  # DESTINATION S3 BUCKET
  # ==============================
  DestinationBucketResource:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DestinationBucket

  # ==============================
  # LAMBDA IAM ROLE
  # ==============================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FunctionName}-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: LambdaS3Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # S3 permissions
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:CopyObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${SourceBucket}
                  - !Sub arn:aws:s3:::${SourceBucket}/*
                  - !Sub arn:aws:s3:::${DestinationBucket}/*

              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  # ==============================
  # LAMBDA FUNCTION
  # ==============================
  MoveFileLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName   # FINAL Lambda name = MoveFileLambda
      Runtime: python3.11
      Handler: MoveFileLambda.lambda_handler  # ✅ FIXED (your file name)

      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300

      Code:
        S3Bucket: my-dataengineer-eventbased-eventbridge-projects
        S3Key: lambda-code/move-file-lambda/move-file-lambda.zip

      Environment:
        Variables:
          SOURCE_BUCKET: !Ref SourceBucket
          DEST_BUCKET: !Ref DestinationBucket

  # ==============================
  # EVENTBRIDGE RULE
  # ==============================
  S3UploadEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: S3UploadEventRule
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref SourceBucket
      Targets:
        - Arn: !GetAtt MoveFileLambda.Arn
          Id: LambdaTarget

  # ==============================
  # PERMISSION FOR EVENTBRIDGE
  # ==============================
  LambdaPermissionForEventBridge:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MoveFileLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt S3UploadEventRule.Arn